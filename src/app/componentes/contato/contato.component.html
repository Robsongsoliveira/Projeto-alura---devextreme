<section class="contato">
    <ul>
      <img
        [src]="avatar"
        alt="avatar"
        class="avatar"
        [routerLink]="['/perfil-contato', id]">
        <li>
            <strong>{{ nome }}</strong>
        </li>
        <li>{{ telefone }}</li>
        <li class="acoes">
            <dx-button
              icon="edit"
              stylingMode="text"
              (onClick)="editarContato()">
            </dx-button>
            <dx-button
              icon="trash"
              stylingMode="text"
              type="danger"
              (onClick)="abrirPerfil()">
            </dx-button>
        </li>
    </ul>
</section>
